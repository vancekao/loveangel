<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>愛天使網站</title>
  <meta name="description" content="愛天使官方網站" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="home-no-hero">

    <div class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html"><span class="brand-icon"><img id="siteLogoImage" class="brand-logo-image site-logo-image" src="" alt="網站 Logo" style="display:none"><span id="siteLogoFallback" class="site-logo-fallback">❤</span></span><span id="siteName" class="brand-name-text">愛天使</span></a>
        <nav class="nav">
          <a href="index.html" data-page="index.html">首頁</a>
          <a href="about.html" data-page="about.html">關於愛天使</a>
          <a href="special-education.html" data-page="special-education.html">特教認識</a>
          <a href="news.html" data-page="news.html">最新消息</a>
          <a href="event.html" data-page="event.html">園遊會專區</a>
          <a href="sponsors.html" data-page="sponsors.html">贊助合作</a>
          <a href="contact.html" data-page="contact.html">聯絡我們</a>
        </nav>
      </div>
    </div>


<main>
  <div class="container">

    <section class="section" id="homeNewsSection">
      <div class="section-card">
        <div class="section-head">
          <div>
            <h2 class="section-title">最新消息</h2>
            <p class="section-subtitle">快速掌握愛天使最新活動、倡議與合作動態。</p>
          </div>
          <a class="btn btn-soft" href="news.html">查看更多</a>
        </div>
        <div class="grid-3" id="homeNews"></div>
      </div>
    </section>
    <section class="section" id="homeCarouselSection">
      <div class="section-card">
        <div class="section-head">
          <div>
            <h2 class="section-title" id="carouselTitle">愛天使活動精選</h2>
            <p class="section-subtitle" id="carouselSubtitle">首頁可輪播展示活動主視覺、合作亮點與報名入口。</p>
          </div>
        </div>
        <div class="carousel" id="homeCarousel">
          <div class="carousel-track" id="homeCarouselTrack"></div>
          <button class="carousel-btn prev" id="carouselPrev" aria-label="上一張">‹</button>
          <button class="carousel-btn next" id="carouselNext" aria-label="下一張">›</button>
          <div class="carousel-dots" id="carouselDots"></div>
        </div>
      </div>
    </section>
    <section class="section" id="homeIntroSection">
      <div class="section-card">
        <div class="section-head">
          <div>
            <h2 class="section-title" id="homeIntroTitle">讓社會更靠近特教，也讓孩子被更多愛接住</h2>
            <p class="section-subtitle" id="homeIntroText">愛天使希望透過網站、活動、媒體與企業合作，讓更多人理解特殊教育孩子的特質與需求。</p>
          </div>
        </div>
        <div class="grid-3" id="homeFeatures"></div>
      </div>
    </section>

    <section class="section" id="homeRegistrationSection">
      <div class="section-card">
        <div class="section-head">
          <div>
            <h2 class="section-title" id="registrationTitle">活動報名資訊</h2>
            <p class="section-subtitle" id="registrationSubtitle">歡迎依需求快速前往不同報名入口。</p>
          </div>
        </div>
        <div class="grid-3" id="homeRegistrations"></div>
      </div>
    </section>
  </div>
</main>


    <footer class="footer">
      <div class="container">
        <div class="footer-card footer-card-simple">
          <strong id="footerSiteName">愛天使</strong>
        </div>
      </div>
    </footer>
    <div class="admin-float">
</div>
    <script src="assets/default-data.js"></script>
    <script src="assets/app.js"></script>

</body>
</html>
