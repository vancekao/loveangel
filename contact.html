<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>愛天使網站</title>
  <meta name="description" content="愛天使官方網站" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

    <div class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html"><span class="brand-icon"><img id="siteLogoImage" class="brand-logo-image site-logo-image" src="" alt="網站 Logo" style="display:none"><span id="siteLogoFallback" class="site-logo-fallback">❤</span></span><span id="siteName" class="brand-name-text">愛天使</span></a>
        <nav class="nav">
          <a href="index.html" data-page="index.html">首頁</a>
          <a href="about.html" data-page="about.html">關於愛天使</a>
          <a href="special-education.html" data-page="special-education.html">特教認識</a>
          <a href="news.html" data-page="news.html">最新消息</a>
          <a href="event.html" data-page="event.html">園遊會專區</a>
          <a href="sponsors.html" data-page="sponsors.html">贊助合作</a>
          <a href="contact.html" data-page="contact.html">聯絡我們</a>
        </nav>
      </div>
    </div>


<main><div class="container"><section class="section" id="contactSection"><div class="section-card">
<div class="section-head"><div><h2 class="section-title">聯絡我們</h2><p class="section-subtitle" id="contactNotice">歡迎企業合作、志工報名、媒體邀訪與活動合作洽詢。</p></div></div>
<div class="columns">
  <div class="panel" id="contactInfoPanel">
    <h3>聯絡資訊</h3>
    <div class="contact-media" id="contactMediaWrap" style="display:none"><a id="contactMediaLink" href="#"><img id="contactMediaImage" src="" alt="聯絡頁圖片"></a></div>
    <div class="contact-list">
      <div class="contact-item"><strong>Email：</strong><span id="contactEmail"></span></div>
      <div class="contact-item"><strong>電話：</strong><span id="contactPhone"></span></div>
      <div class="contact-item"><strong>地址：</strong><span id="contactAddress"></span></div>
    </div>
  </div>
  <div class="panel" id="contactFormPanel">
    <h3>合作表單</h3>
    <form id="contact-form" class="form-grid">
      <input class="input" placeholder="您的姓名 / 單位名稱" required />
      <input class="input" type="email" placeholder="Email" required />
      <input class="input" placeholder="聯絡電話" />
      <textarea class="input" placeholder="請輸入合作需求、報名內容或聯絡事項"></textarea>
      <button class="btn btn-primary" type="submit">送出表單</button>
    </form>
  </div>
</div></div></section></div></main>


    <footer class="footer">
      <div class="container">
        <div class="footer-card footer-card-simple">
          <strong id="footerSiteName">愛天使</strong>
        </div>
      </div>
    </footer>
    <div class="admin-float">
</div>
    <script src="assets/default-data.js"></script>
    <script src="assets/app.js"></script>

</body>
</html>
